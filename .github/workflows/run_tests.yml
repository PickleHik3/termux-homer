name: Test app

on:
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
    - name: Setup java 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Execute tests
      env:
        GRADLE_OPTS: >-
          -Dorg.gradle.internal.http.connectionTimeout=120000
          -Dorg.gradle.internal.http.socketTimeout=120000
      run: |
        attempts=0
        max_attempts=3
        until [ "$attempts" -ge "$max_attempts" ]; do
          if ./gradlew :app:verifyReleaseHardening :app:testDebugUnitTest :terminal-emulator:test; then
            exit 0
          fi
          attempts=$((attempts + 1))
          if [ "$attempts" -ge "$max_attempts" ]; then
            echo "Gradle test run failed after ${max_attempts} attempts."
            exit 1
          fi
          echo "Gradle test run failed, retrying in 20 seconds... (${attempts}/${max_attempts})"
          sleep 20
        done
